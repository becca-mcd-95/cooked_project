{% extends "cooked/base.html" %}
{% block content %}
<h2>Search results for "{{ query }}"</h2>

{% if users %}
    <ul>
        {% for u in users %}
            <li><a href="{% url 'cooked:user_profile' %}?user={{ u.id }}">{{ u.username }}</a></li>
        {% endfor %}
    </ul>
{% else %}
    <p>No users found.</p>
{% endif %}
{% endblock %}
