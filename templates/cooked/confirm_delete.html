<!-- Yanyan Template -->
{% extends 'cooked/base.html' %}
{% load static %}
{% block title %}Delete recipe - We're Cooked{% endblock %}
{% block content %}
  <section class="section">
    <div class="card">
      <h2 class="section__title">Delete recipe</h2>
      <p class="muted">Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn--danger" type="submit">Delete</button>
        <a class="btn btn--ghost" href="{% url 'cooked:recipe_detail' object.id %}">Cancel</a>
      </form>
    </div>
  </section>
{% endblock %}
