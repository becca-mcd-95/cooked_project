<!-- Yanyan Template -->
{% load static %}
<div class="card review-card" data-review-id="{{ review.id }}">
  <div class="review-card__top">
    <a class="link" href="{% url 'cooked:user_profile' review.user.username %}">@{{ review.user.username }}</a>
    <div class="stars" data-stars="{{ review.rating }}"></div>
  </div>
  {% if review.comment %}
    <div class="review-card__text">{{ review.comment }}</div>
  {% else %}
    <div class="muted">(No comment)</div>
  {% endif %}
  <div class="muted">{{ review.created_at|date:"Y-m-d H:i" }}</div>
  {% if user.is_authenticated and review.user_id == user.id %}
    <div style="margin-top:10px">
      <button class="btn btn--danger btn--sm" type="button" data-review-delete data-review-id="{{ review.id }}">Delete</button>
    </div>
  {% endif %}
</div>
