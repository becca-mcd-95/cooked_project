<!DOCTYPE html>
{% load staticfiles %}
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{% static 'CSS/style.css' %}" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <header class="navbar navbar-expend-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <div>
                <ul class="nav col012 cold-1g-auto mb-2 justify-content-centre mb-md-0">
                    <li>
                        <a href="{% url 'cooked:home' %}" class="nav-link px-2 text-secondary">Home</a>
                    </li>
                    <li>
                        <a href="{% url 'cooked:user_profile' %}" class="nav-link px-2 text secondary">Profile</a>
                    </li>
                    {% if user.is_authenticated %}
                        <li>
                            <a href="{% url 'cooked:logout' %}" class="nav-link px-2 text secondary">Logout</a>
                        </li>
                    {% else %}
                        <li>
                            <a href="{% url 'cooked:login' %}" class="nav-link px-2 text secondary">Login</a>
                        </li>
                        <li>
                            <a href="{% url 'cooked:signup' %}" class="nav-link px-2 text secondary">Sign Up</a>
                        </li>
                    {% endif %}
                    <!-- there will be two more links to recipes and reviews in here -->
                </ul>
            </div>
        </div>
    </header>
    <body>
        <div>
            {% block body_block %}
            {% endblock %}
        </div>
    </body>
    <hr />
    <div>
        <!-- the footer base with paths to global section on sitemap (about, FAQ, contact etc)-->
    </div>
