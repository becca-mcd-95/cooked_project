<!-- Becca template -->
<!DOCTYPE html>
{% load staticfiles %}
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>We're Cooked</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{% static 'CSS/style.css' %}" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        
    </head>
    <body class="body bg-dark-green text-light-green">
        <nav class="navbar navbar-expand-lg navbar-dark bg-green border-bottom border-green-accent">
            <div class="container-fluid">
                <!-- Logo will go here once designed -->
                <a class="navbar-brand fw-bold text-accent" href="{% url 'cooked:home' %}">
                    We're Cooked
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- Navbar content -->
                <div class="collapse navbar-collapse" id="navbarSupportedContent">

                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cooked:home' %}">Home</a>
                        </li>
                        {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cooked:user_profile' %}">Profile</a>
                        </li>
                        {% endif %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cooked:recipe_list' %}">Recipes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#">Reviews</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cooked:ingredient_search' %}">Ingredient Search</a>
                        </li>
                    </ul>

                    <!-- global search bar for people to search users and recipe titles -->
                    <form class="d-flex me-2" role="search" method="get" action="{% url 'cooked:search_users' %}">
                        <input class="form-control search-input me-2" type="search" name="q" placeholder="Search users…">
                        <button class="btn btn-outline-light" type="submit">Search</button>
                    </form>

                    <!-- login/logout buttons -->
                    {% if user.is_authenticated %}
                            <a href="{% url 'cooked:logout' %}" class="btn btn-outline-light">Logout</a>
                    {% else %}
                            <a href="{% url 'cooked:login' %}" class="btn btn-outline-light me-2">Login</a>
                            <a href="{% url 'cooked:signup' %}" class="btn btn-accent">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </nav>
        <div>
            {% block content %}
            {% endblock %}
        </div>
        </body>
        <!-- the footer base with paths to global section on sitemap (about, FAQ, contact etc)-->
</html>
