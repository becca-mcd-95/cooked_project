<!DOCTYPE html>
{% load staticfiles %}
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>We're Cooked</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{% static 'CSS/style.css' %}" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body class="body">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <!-- Logo will go here once designed -->
                <a class="navbar-brand" href="{% url 'cooked:home' %}">
                    We're Cooked
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- Navbar content -->
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class ="nav-item">
                            <a class="nav-link" href="{% url 'cooked:home' %}">Home</a>
                        </li>
                        {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cooked:user_profile' %}">Profile</a>
                        </li>
                        {% endif %}
                        <!-- there will be two more links to recipes and reviews in here -->
                    </ul>
                    <!-- Search bar: Tuoyu is building search functionality, will think link to search page or drop down?? -->
                    <form class="d-flex me-3" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search...">
                        <button class="btn btn-outline-light" type="submit">Search</button>
                    </form>
                    <!-- login/logout buttons -->
                    {% if user.is_authenticated %}
                        <li>
                            <a href="{% url 'cooked:logout' %}" class="nav-link px-2 text secondary">Logout</a>
                        </li>
                    {% else %}
                        <li>
                            <a href="{% url 'cooked:login' %}" class="nav-link px-2 text secondary">Login</a>
                        </li>
                        <li>
                            <a href="{% url 'cooked:signup' %}" class="nav-link px-2 text secondary">Sign Up</a>
                        </li>
                    {% endif %}
                </div>
            </div>
        </nav>
        <div class="container mt-4">
            {% block body_block %}
            {% endblock %}
        </div>
        <!-- the footer base with paths to global section on sitemap (about, FAQ, contact etc)-->
    </body>
</html>
